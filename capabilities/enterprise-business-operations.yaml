naftiko: 1.0.0-alpha2
info:
  label: SAP Enterprise Business Operations
  description: Unified workflow combining SAP Business One, S/4HANA Cloud Business Partner, and AI Core APIs for managing
    business partners, orders, financials, and AI-driven automation across SAP ERP systems.
  tags:
  - SAP
  - Enterprise
  - ERP
  - AI
  - Business Operations
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    SAP_AI_CORE_OAUTH_TOKEN: SAP_AI_CORE_OAUTH_TOKEN
    SAP_B1_USERNAME: SAP_B1_USERNAME
    SAP_B1_PASSWORD: SAP_B1_PASSWORD
    SAP_B1_COMPANY_DB: SAP_B1_COMPANY_DB
    SAP_S4HANA_USERNAME: SAP_S4HANA_USERNAME
    SAP_S4HANA_PASSWORD: SAP_S4HANA_PASSWORD
capability:
  consumes:
  - type: http
    namespace: sap-ai-core
    baseUri: https://api.ai.eu10.cfapps.hana.hana.ondemand.com/v2
    description: SAP AI Core API for scenario management, execution orchestration, model serving, and artifact tracking.
    authentication:
      type: bearer
      token: '{{SAP_AI_CORE_OAUTH_TOKEN}}'
    resources:
    - name: scenarios
      path: /lm/scenarios
      description: AI scenario definitions and metadata
      operations:
      - name: list-scenarios
        method: GET
        description: Retrieves all AI scenarios available in the resource group.
        inputParameters:
        - name: AI-Resource-Group
          in: header
          type: string
          required: true
          description: The resource group for multi-tenancy isolation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-scenario-versions
        method: GET
        path: /{scenarioId}/versions
        description: Retrieves all versions for a specific AI scenario.
        inputParameters:
        - name: scenarioId
          in: path
          type: string
          required: true
          description: Scenario identifier
        - name: AI-Resource-Group
          in: header
          type: string
          required: true
          description: The resource group for multi-tenancy isolation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: configurations
      path: /lm/configurations
      description: Execution and deployment configurations
      operations:
      - name: list-configurations
        method: GET
        description: Retrieves all configurations for executions and deployments.
        inputParameters:
        - name: AI-Resource-Group
          in: header
          type: string
          required: true
          description: The resource group for multi-tenancy isolation
        - name: scenarioId
          in: query
          type: string
          required: false
          description: Filter by scenario ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-configuration
        method: POST
        description: Creates a new configuration for an execution or deployment.
        inputParameters:
        - name: AI-Resource-Group
          in: header
          type: string
          required: true
          description: The resource group for multi-tenancy isolation
        body:
          type: json
          data:
            name: '{{tools.name}}'
            scenarioId: '{{tools.scenarioId}}'
            executableId: '{{tools.executableId}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: executions
      path: /lm/executions
      description: Training execution lifecycle management
      operations:
      - name: list-executions
        method: GET
        description: Retrieves all training executions in the resource group.
        inputParameters:
        - name: AI-Resource-Group
          in: header
          type: string
          required: true
          description: The resource group for multi-tenancy isolation
        - name: status
          in: query
          type: string
          required: false
          description: Filter by execution status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-execution
        method: POST
        description: Triggers a new training execution using a configuration.
        inputParameters:
        - name: AI-Resource-Group
          in: header
          type: string
          required: true
          description: The resource group for multi-tenancy isolation
        body:
          type: json
          data:
            configurationId: '{{tools.configurationId}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-execution
        method: GET
        path: /{executionId}
        description: Retrieves details of a specific training execution.
        inputParameters:
        - name: executionId
          in: path
          type: string
          required: true
          description: Execution identifier
        - name: AI-Resource-Group
          in: header
          type: string
          required: true
          description: The resource group for multi-tenancy isolation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-execution
        method: DELETE
        path: /{executionId}
        description: Stops a running execution or marks it for deletion.
        inputParameters:
        - name: executionId
          in: path
          type: string
          required: true
          description: Execution identifier
        - name: AI-Resource-Group
          in: header
          type: string
          required: true
          description: The resource group for multi-tenancy isolation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: deployments
      path: /lm/deployments
      description: Model deployment and serving management
      operations:
      - name: list-deployments
        method: GET
        description: Retrieves all model deployments in the resource group.
        inputParameters:
        - name: AI-Resource-Group
          in: header
          type: string
          required: true
          description: The resource group for multi-tenancy isolation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-deployment
        method: POST
        description: Creates a new model deployment for serving predictions.
        inputParameters:
        - name: AI-Resource-Group
          in: header
          type: string
          required: true
          description: The resource group for multi-tenancy isolation
        body:
          type: json
          data:
            configurationId: '{{tools.configurationId}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: artifacts
      path: /lm/artifacts
      description: Model artifacts and dataset management
      operations:
      - name: list-artifacts
        method: GET
        description: Retrieves all artifacts (models, datasets) in the resource group.
        inputParameters:
        - name: AI-Resource-Group
          in: header
          type: string
          required: true
          description: The resource group for multi-tenancy isolation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-artifact
        method: POST
        description: Registers a new artifact (model or dataset) for use in executions and deployments.
        inputParameters:
        - name: AI-Resource-Group
          in: header
          type: string
          required: true
          description: The resource group for multi-tenancy isolation
        body:
          type: json
          data:
            name: '{{tools.name}}'
            kind: '{{tools.kind}}'
            url: '{{tools.url}}'
            scenarioId: '{{tools.scenarioId}}'
            description: '{{tools.description}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: sap-business-one
    baseUri: https://localhost:50000/b1s/v1
    description: SAP Business One Service Layer for CRUD operations on business objects.
    authentication:
      type: apikey
      key: B1SESSION
      value: '{{SAP_B1_SESSION}}'
      placement: cookie
    resources:
    - name: authentication
      path: /
      description: Login and session management
      operations:
      - name: login
        method: POST
        path: /Login
        description: Authenticates a user and returns a session cookie.
        body:
          type: json
          data:
            CompanyDB: '{{tools.companyDB}}'
            UserName: '{{tools.userName}}'
            Password: '{{tools.password}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: logout
        method: POST
        path: /Logout
        description: Terminates the current authenticated session.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: business-partners
      path: /BusinessPartners
      description: Manage customers, vendors, and leads
      operations:
      - name: list-business-partners
        method: GET
        description: Retrieves a list of business partners.
        inputParameters:
        - name: $select
          in: query
          type: string
          required: false
          description: Fields to include in the response
        - name: $filter
          in: query
          type: string
          required: false
          description: OData filter expression
        - name: $top
          in: query
          type: integer
          required: false
          description: Maximum number of records
        - name: $skip
          in: query
          type: integer
          required: false
          description: Number of records to skip
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-business-partner
        method: POST
        description: Creates a new business partner record.
        body:
          type: json
          data:
            CardCode: '{{tools.cardCode}}'
            CardName: '{{tools.cardName}}'
            CardType: '{{tools.cardType}}'
            EmailAddress: '{{tools.emailAddress}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-business-partner
        method: GET
        path: /('{CardCode}')
        description: Retrieves a specific business partner by card code.
        inputParameters:
        - name: CardCode
          in: path
          type: string
          required: true
          description: The unique card code
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-business-partner
        method: PATCH
        path: /('{CardCode}')
        description: Updates an existing business partner record.
        inputParameters:
        - name: CardCode
          in: path
          type: string
          required: true
          description: The unique card code
        body:
          type: json
          data:
            CardName: '{{tools.cardName}}'
            EmailAddress: '{{tools.emailAddress}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orders
      path: /Orders
      description: Sales orders management
      operations:
      - name: list-orders
        method: GET
        description: Retrieves a list of sales orders.
        inputParameters:
        - name: $select
          in: query
          type: string
          required: false
          description: Fields to include
        - name: $filter
          in: query
          type: string
          required: false
          description: OData filter expression
        - name: $top
          in: query
          type: integer
          required: false
          description: Maximum number of records
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-order
        method: POST
        description: Creates a new sales order with line items.
        body:
          type: json
          data:
            CardCode: '{{tools.cardCode}}'
            DocDate: '{{tools.docDate}}'
            DocumentLines: '{{tools.documentLines}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: items
      path: /Items
      description: Product and item master data
      operations:
      - name: list-items
        method: GET
        description: Retrieves the item master data list.
        inputParameters:
        - name: $select
          in: query
          type: string
          required: false
          description: Fields to include
        - name: $filter
          in: query
          type: string
          required: false
          description: OData filter expression
        - name: $top
          in: query
          type: integer
          required: false
          description: Maximum number of records
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: journal-entries
      path: /JournalEntries
      description: Financial journal entries and postings
      operations:
      - name: list-journal-entries
        method: GET
        description: Retrieves financial journal entries.
        inputParameters:
        - name: $filter
          in: query
          type: string
          required: false
          description: OData filter expression
        - name: $top
          in: query
          type: integer
          required: false
          description: Maximum number of records
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-journal-entry
        method: POST
        description: Creates a new financial journal entry.
        body:
          type: json
          data:
            ReferenceDate: '{{tools.referenceDate}}'
            Memo: '{{tools.memo}}'
            JournalEntryLines: '{{tools.journalEntryLines}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: invoices
      path: /Invoices
      description: AR and AP invoice management
      operations:
      - name: list-invoices
        method: GET
        description: Retrieves accounts receivable invoices.
        inputParameters:
        - name: $filter
          in: query
          type: string
          required: false
          description: OData filter expression
        - name: $top
          in: query
          type: integer
          required: false
          description: Maximum number of records
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-invoice
        method: POST
        description: Creates a new accounts receivable invoice.
        body:
          type: json
          data:
            CardCode: '{{tools.cardCode}}'
            DocDate: '{{tools.docDate}}'
            DocumentLines: '{{tools.documentLines}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: sap-s4hana-bp
    baseUri: https://sandbox.api.sap.com/sap/opu/odata/sap/API_BUSINESS_PARTNER
    description: SAP S/4HANA Cloud Business Partner OData API for master data management.
    authentication:
      type: basic
      username: '{{SAP_S4HANA_USERNAME}}'
      password: '{{SAP_S4HANA_PASSWORD}}'
    resources:
    - name: business-partners
      path: /A_BusinessPartner
      description: Business partner header data and general information
      operations:
      - name: list-business-partners
        method: GET
        description: Retrieves a collection of business partner master records.
        inputParameters:
        - name: $top
          in: query
          type: integer
          required: false
          description: Maximum number of entries to return
        - name: $skip
          in: query
          type: integer
          required: false
          description: Number of entries to skip
        - name: $filter
          in: query
          type: string
          required: false
          description: OData filter expression
        - name: $select
          in: query
          type: string
          required: false
          description: Properties to return
        - name: $orderby
          in: query
          type: string
          required: false
          description: OData sort expression
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-business-partner
        method: POST
        description: Creates a new business partner master record.
        body:
          type: json
          data:
            BusinessPartnerFullName: '{{tools.fullName}}'
            BusinessPartnerCategory: '{{tools.category}}'
            FirstName: '{{tools.firstName}}'
            LastName: '{{tools.lastName}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-business-partner
        method: GET
        path: /('{BusinessPartner}')
        description: Retrieves a single business partner by its key.
        inputParameters:
        - name: BusinessPartner
          in: path
          type: string
          required: true
          description: Business partner number
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-business-partner
        method: PATCH
        path: /('{BusinessPartner}')
        description: Updates fields of an existing business partner record.
        inputParameters:
        - name: BusinessPartner
          in: path
          type: string
          required: true
          description: Business partner number
        body:
          type: json
          data:
            BusinessPartnerFullName: '{{tools.fullName}}'
            FirstName: '{{tools.firstName}}'
            LastName: '{{tools.lastName}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: addresses
      path: /A_BusinessPartnerAddress
      description: Business partner address management
      operations:
      - name: list-addresses
        method: GET
        description: Retrieves address records associated with business partners.
        inputParameters:
        - name: $top
          in: query
          type: integer
          required: false
          description: Maximum number of entries
        - name: $filter
          in: query
          type: string
          required: false
          description: OData filter expression
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: bank-accounts
      path: /A_BusinessPartnerBank
      description: Business partner bank account details
      operations:
      - name: list-bank-accounts
        method: GET
        description: Retrieves bank account records for business partners.
        inputParameters:
        - name: $top
          in: query
          type: integer
          required: false
          description: Maximum number of entries
        - name: $filter
          in: query
          type: string
          required: false
          description: OData filter expression
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: roles
      path: /A_BusinessPartnerRole
      description: Business partner role assignments
      operations:
      - name: list-roles
        method: GET
        description: Retrieves role assignments for business partners.
        inputParameters:
        - name: $top
          in: query
          type: integer
          required: false
          description: Maximum number of entries
        - name: $filter
          in: query
          type: string
          required: false
          description: OData filter expression
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tax-numbers
      path: /A_BusinessPartnerTaxNumber
      description: Business partner tax identification numbers
      operations:
      - name: list-tax-numbers
        method: GET
        description: Retrieves tax identification numbers for business partners.
        inputParameters:
        - name: $top
          in: query
          type: integer
          required: false
          description: Maximum number of entries
        - name: $filter
          in: query
          type: string
          required: false
          description: OData filter expression
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: sap-enterprise-ops-api
    description: Unified REST API for SAP enterprise business operations spanning ERP, master data, and AI workflows.
    resources:
    - path: /v1/business-partners
      name: b1-business-partners
      description: Business One business partner management
      operations:
      - method: GET
        name: list-b1-business-partners
        description: List business partners from SAP Business One
        call: sap-business-one.list-business-partners
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-b1-business-partner
        description: Create a business partner in SAP Business One
        call: sap-business-one.create-business-partner
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/business-partners/{id}
      name: b1-business-partner-detail
      description: Business One business partner detail
      operations:
      - method: GET
        name: get-b1-business-partner
        description: Get a specific business partner from SAP Business One
        call: sap-business-one.get-business-partner
        with:
          CardCode: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: update-b1-business-partner
        description: Update a business partner in SAP Business One
        call: sap-business-one.update-business-partner
        with:
          CardCode: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/s4hana-business-partners
      name: s4hana-business-partners
      description: S/4HANA Cloud business partner master data
      operations:
      - method: GET
        name: list-s4hana-business-partners
        description: List business partners from S/4HANA Cloud
        call: sap-s4hana-bp.list-business-partners
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-s4hana-business-partner
        description: Create a business partner in S/4HANA Cloud
        call: sap-s4hana-bp.create-business-partner
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders
      name: orders
      description: Sales order management
      operations:
      - method: GET
        name: list-orders
        description: List sales orders from Business One
        call: sap-business-one.list-orders
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-order
        description: Create a sales order in Business One
        call: sap-business-one.create-order
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/items
      name: items
      description: Item master data
      operations:
      - method: GET
        name: list-items
        description: List items from Business One
        call: sap-business-one.list-items
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/invoices
      name: invoices
      description: Invoice management
      operations:
      - method: GET
        name: list-invoices
        description: List invoices from Business One
        call: sap-business-one.list-invoices
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-invoice
        description: Create an invoice in Business One
        call: sap-business-one.create-invoice
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/journal-entries
      name: journal-entries
      description: Financial journal entries
      operations:
      - method: GET
        name: list-journal-entries
        description: List journal entries from Business One
        call: sap-business-one.list-journal-entries
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-journal-entry
        description: Create a journal entry in Business One
        call: sap-business-one.create-journal-entry
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/addresses
      name: addresses
      description: S/4HANA business partner addresses
      operations:
      - method: GET
        name: list-addresses
        description: List business partner addresses from S/4HANA
        call: sap-s4hana-bp.list-addresses
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/scenarios
      name: ai-scenarios
      description: AI scenario management
      operations:
      - method: GET
        name: list-scenarios
        description: List AI scenarios from AI Core
        call: sap-ai-core.list-scenarios
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/executions
      name: ai-executions
      description: AI execution management
      operations:
      - method: GET
        name: list-executions
        description: List AI executions
        call: sap-ai-core.list-executions
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-execution
        description: Create an AI execution
        call: sap-ai-core.create-execution
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/deployments
      name: ai-deployments
      description: AI deployment management
      operations:
      - method: GET
        name: list-deployments
        description: List AI deployments
        call: sap-ai-core.list-deployments
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-deployment
        description: Create an AI deployment
        call: sap-ai-core.create-deployment
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: sap-enterprise-ops-mcp
    transport: http
    description: MCP server for AI-assisted SAP enterprise business operations across ERP, master data, and AI workflows.
    tools:
    - name: b1-list-business-partners
      description: List business partners from SAP Business One
      hints:
        readOnly: true
        openWorld: true
      call: sap-business-one.list-business-partners
      outputParameters:
      - type: object
        mapping: $.
    - name: b1-create-business-partner
      description: Create a business partner in SAP Business One
      hints:
        readOnly: false
      call: sap-business-one.create-business-partner
      outputParameters:
      - type: object
        mapping: $.
    - name: b1-get-business-partner
      description: Get a specific business partner from SAP Business One
      hints:
        readOnly: true
        openWorld: true
      call: sap-business-one.get-business-partner
      outputParameters:
      - type: object
        mapping: $.
    - name: b1-update-business-partner
      description: Update a business partner in SAP Business One
      hints:
        readOnly: false
        idempotent: true
      call: sap-business-one.update-business-partner
      outputParameters:
      - type: object
        mapping: $.
    - name: b1-list-orders
      description: List sales orders from SAP Business One
      hints:
        readOnly: true
        openWorld: true
      call: sap-business-one.list-orders
      outputParameters:
      - type: object
