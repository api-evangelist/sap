naftiko: "1.0.0-alpha1"

info:
  label: "SAP S/4HANA Cloud Business Partner"
  description: "OData v2 API for managing business partner master data in SAP S/4HANA Cloud including addresses, bank accounts, tax numbers, and roles."
  tags:
    - SAP
    - S/4HANA
    - Business Partner
    - Master Data
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SAP_S4HANA_USERNAME: SAP_S4HANA_USERNAME
      SAP_S4HANA_PASSWORD: SAP_S4HANA_PASSWORD

capability:
  consumes:
    - type: http
      namespace: sap-s4hana-bp
      baseUri: https://sandbox.api.sap.com/sap/opu/odata/sap/API_BUSINESS_PARTNER
      description: "SAP S/4HANA Cloud Business Partner OData API for master data management."
      authentication:
        type: basic
        username: "{{SAP_S4HANA_USERNAME}}"
        password: "{{SAP_S4HANA_PASSWORD}}"
      resources:
        - name: business-partners
          path: /A_BusinessPartner
          description: "Business partner header data and general information"
          operations:
            - name: list-business-partners
              method: GET
              description: "Retrieves a collection of business partner master records."
              inputParameters:
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of entries to return"
                - name: $skip
                  in: query
                  type: integer
                  required: false
                  description: "Number of entries to skip"
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression"
                - name: $select
                  in: query
                  type: string
                  required: false
                  description: "Properties to return"
                - name: $orderby
                  in: query
                  type: string
                  required: false
                  description: "OData sort expression"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-business-partner
              method: POST
              description: "Creates a new business partner master record."
              body:
                type: json
                data:
                  BusinessPartnerFullName: "{{tools.fullName}}"
                  BusinessPartnerCategory: "{{tools.category}}"
                  FirstName: "{{tools.firstName}}"
                  LastName: "{{tools.lastName}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-business-partner
              method: GET
              path: /('{BusinessPartner}')
              description: "Retrieves a single business partner by its key."
              inputParameters:
                - name: BusinessPartner
                  in: path
                  type: string
                  required: true
                  description: "Business partner number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-business-partner
              method: PATCH
              path: /('{BusinessPartner}')
              description: "Updates fields of an existing business partner record."
              inputParameters:
                - name: BusinessPartner
                  in: path
                  type: string
                  required: true
                  description: "Business partner number"
              body:
                type: json
                data:
                  BusinessPartnerFullName: "{{tools.fullName}}"
                  FirstName: "{{tools.firstName}}"
                  LastName: "{{tools.lastName}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: addresses
          path: /A_BusinessPartnerAddress
          description: "Business partner address management"
          operations:
            - name: list-addresses
              method: GET
              description: "Retrieves address records associated with business partners."
              inputParameters:
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of entries"
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: bank-accounts
          path: /A_BusinessPartnerBank
          description: "Business partner bank account details"
          operations:
            - name: list-bank-accounts
              method: GET
              description: "Retrieves bank account records for business partners."
              inputParameters:
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of entries"
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: roles
          path: /A_BusinessPartnerRole
          description: "Business partner role assignments"
          operations:
            - name: list-roles
              method: GET
              description: "Retrieves role assignments for business partners."
              inputParameters:
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of entries"
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: tax-numbers
          path: /A_BusinessPartnerTaxNumber
          description: "Business partner tax identification numbers"
          operations:
            - name: list-tax-numbers
              method: GET
              description: "Retrieves tax identification numbers for business partners."
              inputParameters:
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of entries"
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: sap-s4hana-bp-rest
      resources:
        - path: /v1/business-partners
          name: business-partners
          description: "Business partner management"
          operations:
            - method: GET
              name: list-business-partners
              description: "List all business partners"
              call: "sap-s4hana-bp.list-business-partners"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-business-partner
              description: "Create a new business partner"
              call: "sap-s4hana-bp.create-business-partner"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/addresses
          name: addresses
          description: "Address management"
          operations:
            - method: GET
              name: list-addresses
              description: "List business partner addresses"
              call: "sap-s4hana-bp.list-addresses"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/bank-accounts
          name: bank-accounts
          description: "Bank account management"
          operations:
            - method: GET
              name: list-bank-accounts
              description: "List business partner bank accounts"
              call: "sap-s4hana-bp.list-bank-accounts"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: sap-s4hana-bp-mcp
      transport: http
      tools:
        - name: list-business-partners
          description: "List business partner master records"
          hints:
            readOnly: true
            openWorld: true
          call: "sap-s4hana-bp.list-business-partners"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-business-partner
          description: "Create a new business partner"
          hints:
            readOnly: false
          call: "sap-s4hana-bp.create-business-partner"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-business-partner
          description: "Get a specific business partner by key"
          hints:
            readOnly: true
            openWorld: true
          call: "sap-s4hana-bp.get-business-partner"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-business-partner
          description: "Update an existing business partner"
          hints:
            readOnly: false
            idempotent: true
          call: "sap-s4hana-bp.update-business-partner"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-addresses
          description: "List business partner addresses"
          hints:
            readOnly: true
            openWorld: true
          call: "sap-s4hana-bp.list-addresses"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-bank-accounts
          description: "List business partner bank accounts"
          hints:
            readOnly: true
            openWorld: true
          call: "sap-s4hana-bp.list-bank-accounts"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-roles
          description: "List business partner role assignments"
          hints:
            readOnly: true
            openWorld: true
          call: "sap-s4hana-bp.list-roles"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-tax-numbers
          description: "List business partner tax identification numbers"
          hints:
            readOnly: true
            openWorld: true
          call: "sap-s4hana-bp.list-tax-numbers"
          outputParameters:
            - type: object
              mapping: "$."
