specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: SAP
providerId: sap
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - SAP
  - Enterprise
  - BTP
description: FOCUS-aligned FinOps placeholder for SAP. SAP markets a contract- and partner-mediated portfolio
  (CPEA, BTPEA, pay-as-you-go consumption units) without a public, machine-readable rate card; meters
  and billing model below are intentionally generic until per-service billing terms can be sourced.
sources:
  - https://www.sap.com
  - https://store.sap.com
notes: SAP corporate pricing and BTP Discovery Center pages are gated against automated fetches; meters
  and FOCUS columns should be reconciled per product (S/4HANA Cloud, BTP, Ariba, SuccessFactors, Concur,
  etc.) once published terms are available.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: SAP SE
serviceCategory: Enterprise Software / Cloud Platform
billingModel:
  pricingCategory: Enterprise Contract (CPEA / BTPEA / PAYG)
  billingFrequency: Per-Invoice
  billingCurrency: USD/EUR/varies
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
focusColumns:
  ServiceName: SAP
  ServiceCategory: Enterprise Software
  ProviderName: SAP
  PublisherName: SAP SE
  InvoiceIssuerName: SAP SE
  BillingCurrency: USD
meters:
  - name: contracted_consumption
    description: Consumption against the customer's CPEA/BTPEA contract or pay-as-you-go entitlement;
      reconcile to actual SAP-published meters per service.
    unit: varies
    aggregation: sum
    dimensions:
      - service
      - region
principles:
  - name: Visibility
    description: Use SAP for Me and the BTP Cockpit (where applicable) to view consumption against entitlements;
      detailed line items appear on the SAP invoice and CPEA balance reports.
  - name: Allocation
    description: Allocate by SAP global account, subaccount, and directory; map subaccounts to internal
      cost centers in the BTP cockpit.
  - name: Optimization
    description: Track CPEA/BTPEA balance burn, right-size BTP service plans, and prefer reserved capacity
      where SAP offers it; verify per-service through SAP sales since published rates are limited.
  - name: Accountability
    description: Designate a SAP global-account billing owner; reconcile invoices monthly with SAP for
      Me reports and contract entitlements.
maintainers:
