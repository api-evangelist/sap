      - name: SAP Signavio Process Manager API
      - name: SAP Document Management Service API
      - name: SAP Integration Suite API Management
      - name: SAP AI Core API
      - name: SAP Emarsys Customer Engagement API
      - name: SAP Build Work Zone API
  - id: sap-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-negotiated tier for SAP. Includes dedicated capacity, contractual SLAs, security
      review, data residency options, and named technical account management.
    entries:
      - label: API Requests
        description: Negotiated request volume; -1 indicates uncapped subject to fair use
        name: api_requests
        type: quota
        metric: requests
        limit: -1
        timeFrame: month
        geo: configurable
        domains: []
        unit: 1
        price: custom
        userMultiplied: false
