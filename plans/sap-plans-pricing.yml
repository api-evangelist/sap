description: SAP markets a multi-product enterprise platform; commercial terms for SAP products and SAP
  Business Technology Platform (BTP) services are not published on a public pricing page. Customers price
  via SAP sales (CPEA — Cloud Platform Enterprise Agreement, BTPEA, or pay-as-you-go consumption units),
  through SAP Store, or via partners. Trims to a single Contact Sales plan until a public, machine-readable
  rate card is available.
sources:
  - https://www.sap.com
  - https://store.sap.com
notes: SAP corporate pricing pages return HTTP 403 to automated fetches; SAP Store and Discovery Center
  do not expose a public, parseable rate card. Pricing is contract- and partner-mediated.
plans:
  - id: sap-contact-sales
    name: Contact Sales
    type: enterprise
    description: All commercial terms for SAP products and BTP services are negotiated through SAP sales,
      SAP Store, or SAP partners (CPEA, BTPEA, or pay-as-you-go consumption units).
    entries:
      - label: Custom contract
        name: custom
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: configurable
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: SAP Sales Engagement
      - name: SAP Store
      - name: SAP Partner Channel
      - name: CPEA / BTPEA / Pay-As-You-Go
