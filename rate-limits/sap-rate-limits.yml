specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: SAP
providerId: sap
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - AI
  - BTP
  - Business Applications
  - Cloud
  - Data Management
  - Enterprise
  - ERP
  - Integration
  - Rate Limiting
  - Quotas
  - Throttling
description: Machine-readable rate limit definitions for the SAP API surface. Captures per-tier quotas,
  burst behavior, response signaling, and recovery semantics. Defaults are scaffold values to be replaced
  with published provider limits.
headers:
  limit: X-RateLimit-Limit
  remaining: X-RateLimit-Remaining
  reset: X-RateLimit-Reset
  retryAfter: Retry-After
  policy: RateLimit-Policy
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - tier: free
    name: Free Tier Default
    scope: api-key
    metric: requests_per_minute
    limit: 10
    burst: 20
    timeFrame: minute
    applies:
      - SAP Business One Service Layer API
      - SAP S/4HANA Cloud API
      - SAP SuccessFactors API
      - SAP Ariba APIs
      - SAP Cloud Platform Integration Suite
      - SAP Commerce Cloud API
      - SAP Analytics Cloud API
      - SAP Concur API
      - SAP Fieldglass API
      - SAP BTP Core Services API
      - SAP Datasphere API
      - SAP Event Mesh API
      - SAP Master Data Integration API
      - SAP Signavio Process Manager API
      - SAP Document Management Service API
      - SAP Integration Suite API Management
      - SAP AI Core API
      - SAP Emarsys Customer Engagement API
      - SAP Build Work Zone API
  - tier: free
