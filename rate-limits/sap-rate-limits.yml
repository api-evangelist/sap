specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: SAP
providerId: sap
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - SAP
  - Enterprise
  - BTP
description: SAP does not publish a single, public rate-limit policy that applies across its product
  portfolio; throttling and quotas are documented (where they exist) inside each product's help portal
  area and are typically governed by the customer's API Management plan, BTP entitlement, or contract.
  Trims to a placeholder until per-service limits can be sourced from the relevant SAP Help Portal page.
sources:
  - https://help.sap.com
notes: SAP Help Portal pages render via client-side JavaScript and do not expose rate-limit numbers in
  the static HTML returned to automated fetches. Per-service limits should be reconciled from each product's
  help section.
responseCodes:
  throttled: 429
limits:
  - name: Per-service quotas
    scope: account/region/service
    metric: varies
    limit: see SAP Help Portal for the specific product
policies:
  - name: Per-product documentation
    description: Rate limits are documented per product (API Management, Integration Suite, S/4HANA Cloud,
      etc.) on help.sap.com; consult the relevant product help section for current numbers.
  - name: Contract-governed
    description: Effective limits often depend on the customer's BTP entitlement, API Management plan,
      or negotiated contract terms.
maintainers:
